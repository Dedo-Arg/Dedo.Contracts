name: Build & Publish NuGet

on:
  push:
    branches:
      - rbattistoni/main

jobs:
  publish:
    name: Build, Pack & Publish
    runs-on: ubuntu-latest

    permissions:
      contents: write       # para crear tags y releases
      packages: write       # para publicar en GitHub Packages

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # historial completo para calcular el número de commit

      # ── 2. Setup .NET 10 ───────────────────────────────────────────────────
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ── 3. Calcular versión: 1.0.<numero-de-commits> ───────────────────────
      - name: Calculate version
        id: version
        run: |
          COUNT=$(git rev-list --count HEAD)
          VERSION="1.0.$COUNT"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION"    >> $GITHUB_OUTPUT
          echo "Versión calculada: $VERSION"

      # ── 4. Restore ─────────────────────────────────────────────────────────
      - name: Restore
        run: dotnet restore

      # ── 5. Build ───────────────────────────────────────────────────────────
      - name: Build
        run: dotnet build --no-restore --configuration Release

      # ── 6. Pack ────────────────────────────────────────────────────────────
      - name: Pack
        run: >
          dotnet pack
          --no-build
          --configuration Release
          /p:Version=${{ steps.version.outputs.version }}
          --output ./nupkg

      # ── 7. Publicar en GitHub Packages ────────────────────────────────────
      - name: Publish to GitHub Packages
        run: >
          dotnet nuget push ./nupkg/*.nupkg
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --source https://nuget.pkg.github.com/battistoniramiro/index.json
          --skip-duplicate

      # ── 8. Crear tag y GitHub Release ─────────────────────────────────────
      - name: Create Git tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Dedo.Contracts ${{ steps.version.outputs.tag }}"
          body: |
            ## Dedo.Contracts `${{ steps.version.outputs.version }}`

            Publicado automáticamente desde el commit `${{ github.sha }}`.

            ### Instalar
            ```
            dotnet add package Dedo.Contracts --version ${{ steps.version.outputs.version }}
            ```
          files: ./nupkg/*.nupkg
